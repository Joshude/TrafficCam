services:
  trafficcam:
    build: .
    container_name: trafficcam
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./config:/config
      - ./data:/data
      - ./models:/root/.config/Ultralytics   # Cache fuer geladene Modelle
